<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <style>
        /* Modern, minimal styling that scales across devices */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #fafafa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 2rem;
            margin-top: 0;
            color: #111111;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 24px;
        }
        .btn-back {
            display: inline-block;
            text-decoration: none;
            background-color: #111111;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #444444;
        }
        /* Mobile scaling rules */
        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>About the Gallery</h1>
        <p>Welcome! This is a responsive space to tell your visitors about your photography, your creative process, or your background. Type whatever you would like right here inside the paragraph tags.</p>
        
        <!-- Automatically steps out of the /assets/ directory back to your main page -->
        <a href="../" class="btn-back">← Back to Gallery</a>
    </div>

</body>
</html>
